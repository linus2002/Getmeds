<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetMEDS - Under Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0D99FF',
                        dark: '#1A202C',
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased overflow-x-hidden flex flex-col min-h-screen">

    <!-- Navbar Component -->
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center text-center px-4 py-16 relative overflow-hidden">
        <div
            class="absolute inset-0 z-0 bg-blue-100 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-200 to-transparent">
        </div>
        <div class="relative z-10 flex flex-col items-center">
            <img src="assets/under_dev.png" alt="Under Development Illustration"
                class="w-full max-w-[500px] mb-8 drop-shadow-lg rounded-3xl object-cover mix-blend-multiply">
            <div
                class="bg-white px-8 py-2 rounded-full shadow-sm border border-gray-100 text-sm font-bold text-primary mb-6 flex items-center uppercase tracking-widest">
                <i class="fa-solid fa-person-digging mr-2 text-lg"></i> Construction in Progress
            </div>
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-dark mb-4 tracking-tight leading-tight">Page
                Under<br>Development</h1>
            <p class="text-gray-500 mb-10 max-w-lg text-lg">We're currently working hard to build this section of
                GetMEDS. It will be available very soon, check back later!</p>
            <a href="index.html"
                class="bg-primary hover:bg-blue-600 text-white font-bold py-4 px-10 rounded-full transition duration-300 shadow-xl shadow-blue-500/30 text-lg flex items-center space-x-2">
                <i class="fa-solid fa-arrow-left"></i> <span>Go Back Home</span>
            </a>
        </div>
    </main>

    <!-- Footer Component -->
    <div id="footer-placeholder"></div>

    <script src="components/components.js"></script>
</body>

</html>
