<script>
    console.log('[GetMEDS] Navbar Script initializing...');
    // Mark active nav link based on current page
    (function () {
        const page = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('nav a[href]').forEach(link => {
            if (link.getAttribute('href') === page) {
                link.classList.add('text-primary');
            }
        });
    })();

    window.toggleSearchBar = function () {
        const searchBar = document.getElementById('search-bar-container');
        if (searchBar.classList.contains('hidden')) {
            searchBar.classList.remove('hidden');
            setTimeout(() => {
                searchBar.classList.remove('opacity-0', '-translate-y-2');
                searchBar.classList.add('opacity-100', 'translate-y-0');
                const input = searchBar.querySelector('input');
                if (input) input.focus();
            }, 10);
        } else {
            searchBar.classList.remove('opacity-100', 'translate-y-0');
            searchBar.classList.add('opacity-0', '-translate-y-2');
            setTimeout(() => {
                searchBar.classList.add('hidden');
            }, 300);
        }
    };

    window.toggleMobileMenu = function (forceClose = false) {
        const menu = document.getElementById('mobile-menu');
        const searchBar = document.getElementById('search-bar-container');

        // Hide search if opening menu
        if (!forceClose && menu.classList.contains('hidden') && !searchBar.classList.contains('hidden')) {
            toggleSearchBar();
        }

        if (forceClose || !menu.classList.contains('hidden')) {
            menu.classList.add('hidden');
        } else {
            menu.classList.remove('hidden');
        }
    };

    window.executeSearch = function () {
        const query = document.getElementById('navbar-search-input').value.trim();
        if (query) {
            window.location.href = `product-range.html?search=${encodeURIComponent(query)}`;
        }
    };

    // --- Search Suggestion Logic ---
    const searchData = [
        "Cytarabine 100 MG", "Palonosetron Hydrochloride", "Temozolomide Injection",
        "Paracetamol 500mg", "Ibuprofen 400mg", "Vitamin C + Zinc",
        "Oncology Drugs", "Diagnostic Kits", "Personal Care", "Surgical Supplies",
        "Amoxicillin Capsules", "Metformin 500mg", "Atorvastatin 20mg",
        "Face Masks (KN95)", "Digital Thermometer", "Hand Sanitizer"
    ];

    window.handleSearchInput = function (val) {
        const suggestionsBox = document.getElementById('search-suggestions');
        const list = document.getElementById('suggestions-list');
        const query = val.toLowerCase().trim();

        if (query.length < 2) {
            suggestionsBox.classList.add('hidden');
            return;
        }

        const filtered = searchData.filter(item => item.toLowerCase().includes(query)).slice(0, 6);

        if (filtered.length > 0) {
            list.innerHTML = filtered.map(item => `
                <div onclick="selectSuggestion('${item}')" class="px-5 py-3 hover:bg-blue-50 cursor-pointer flex items-center group transition">
                    <i class="fa-solid fa-clock-rotate-left text-gray-300 mr-4 group-hover:text-primary transition"></i>
                    <span class="text-sm text-gray-700 group-hover:text-dark font-medium">${highlightMatch(item, query)}</span>
                    <i class="fa-solid fa-arrow-up-right-from-square ml-auto text-gray-200 text-xs group-hover:text-primary"></i>
                </div>
            `).join('');
            suggestionsBox.classList.remove('hidden');
        } else {
            suggestionsBox.classList.add('hidden');
        }
    };

    function highlightMatch(text, query) {
        const regex = new RegExp(`(${query})`, 'gi');
        return text.replace(regex, '<span class="text-primary font-bold">$1</span>');
    }

    window.selectSuggestion = function (val) {
        document.getElementById('navbar-search-input').value = val;
        document.getElementById('search-suggestions').classList.add('hidden');
        executeSearch();
    };

    // Close suggestions when clicking outside
    document.addEventListener('click', function (e) {
        const container = document.getElementById('search-suggestions');
        const input = document.getElementById('navbar-search-input');
        if (container && !container.contains(e.target) && e.target !== input) {
            container.classList.add('hidden');
        }
    });
</script>
